
font_size        13.0

# window
background_opacity      1
window_padding_width    12
hide_window_decorations no
remember_window_size    yes
# cursor
cursor_shape          beam
cursor_blink_interval 0.5


scrollback_lines 10000


# themes
foreground #D0D0D0
background #1f1f1f
selection_foreground #a9b1d6
selection_background #22262e


cursor                  #F5E0DC
cursor_text_color       #1E1E2E

url_color               #F5E0DC

# Black
color0 #1c252c
color8 #384148

# Red
color1 #e05f65
color9 #fc7b81

# Green
color2  #78dba9
color10 #94f7c5

# Yellow
color3  #f1cf8a
color11 #ffeba6

# Blue
color4  #70a5eb
color12 #8cc1ff

# Magenta
color5  #c68aee
color13 #e2a6ff

# Cyan
color6  #74bee9
color14 #90daff

# White
color7  #dee1e6
color15 #fafdff

# Cursor
cursor #f5f5f5
cursor_text_color #a9b1d6


# keybinding
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+equal   change_font_size all +1.0
map ctrl+minus   change_font_size all -1.0
map ctrl+shift+r load_config_file
map ctrl+enter new_window


# BEGIN_KITTY_FONTS
font_family      family="FiraCode Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

detect_urls yes
url_style straight

shell /usr/bin/fish
